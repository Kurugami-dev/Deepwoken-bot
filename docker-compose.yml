version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: deepwoken-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: deepwoken
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  deepwoken-bot:
    build: .
    container_name: deepwoken-bot
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      MONGO_URL: mongodb://admin:admin123@mongodb:27017/deepwoken
      EVENT_CHANNEL_ID: ${EVENT_CHANNEL_ID}
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET}
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - deepwoken-network

volumes:
  mongodb_data:

networks:
  deepwoken-network:
    driver: bridge
